function genId() { return Math.random().toString(36).slice(2,9); }
function dateRange(s, e) {
  const days=[]; let cur=new Date(s+'T00:00:00'); const last=new Date(e+'T00:00:00');
  while(cur<=last){ days.push(cur.toISOString().split('T')[0]); cur=new Date(cur.getTime()+86400000); }
  return days;
}
function formatDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'}); }
function autoEmoji(n) {
  n=n.toLowerCase();
  const r=[
    [['의류','옷','셔츠','바지','속옷','잠옷'],'👔'],[['세면','샴푸','치약','스킨','로션'],'🧴'],

  ];
  for(const[kws,em]of r) if(kws.some(k=>n.includes(k))) return em;
  return '📦';
}
async function nominatimSearch(q) {
  if(!q.trim()) return [];
  try { const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`,{headers:{'Accept-Language':'ko'}}); return await r.json(); }
  catch { return []; }
}

/* ── Spinner ── */
function Spinner({ size='6' }) {

/* ── Toast ── */
function useToast() {
  const [msg, setMsg] = useState('');
  function toast(m, dur=2000) { setMsg(m); setTimeout(()=>setMsg(''),dur); }
  const Toast = msg ? (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-indigo-600/90 text-white px-5 py-2.5 rounded-xl text-sm shadow-xl fade-in">{msg}</div>
  ) : null;
  return { toast, Toast };
}

/* ── MapPickerModal ── */
function MapPickerModal({ onConfirm, onClose, initialPos, initialName }) {
  const mapRef=useRef(null); const mapInst=useRef(null); const markerRef=useRef(null);
  const [pos,setPos]=useState(initialPos||null);
  const [q,setQ]=useState(initialName||'');
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);

  useEffect(()=>{
    setTimeout(()=>{
      if(!mapRef.current||mapInst.current) return;
      const center=initialPos||[20,0];
      const map=L.map(mapRef.current).setView(center, initialPos?14:2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
      mapInst.current=map;
      if(initialPos){ markerRef.current=L.marker(initialPos,{draggable:true}).addTo(map); markerRef.current.on('dragend',e=>setPos([e.target.getLatLng().lat,e.target.getLatLng().lng])); }
      map.on('click',e=>{
        const ll=[e.latlng.lat,e.latlng.lng]; setPos(ll);
        if(markerRef.current) markerRef.current.setLatLng(ll);
        else { markerRef.current=L.marker(ll,{draggable:true}).addTo(map); markerRef.current.on('dragend',ev=>setPos([ev.target.getLatLng().lat,ev.target.getLatLng().lng])); }
      });
    },100);
    return ()=>{ if(mapInst.current){mapInst.current.remove();mapInst.current=null;} };
  },[]);

  async function doSearch(){ setSearching(true); setResults(await nominatimSearch(q)); setSearching(false); }
  function pickResult(r){
    const ll=[parseFloat(r.lat),parseFloat(r.lon)]; setPos(ll); setResults([]);
    if(mapInst.current){ mapInst.current.setView(ll,16);
      if(markerRef.current) markerRef.current.setLatLng(ll);
      else { markerRef.current=L.marker(ll,{draggable:true}).addTo(mapInst.current); markerRef.current.on('dragend',e=>setPos([e.target.getLatLng().lat,e.target.getLatLng().lng])); }
    }
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
      <div className="glass rounded-2xl w-full max-w-2xl flex flex-col" style={{height:'90vh',maxHeight:640}}>
        <div className="flex items-center justify-between p-4 border-b border-white/10">
          <h3 className="font-bold text-lg gradient-text">📍 위치 선택</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">×</button>
        </div>
        <div className="p-3 border-b border-white/10 space-y-2">
          <div className="flex gap-2">
            <input className="flex-1 rounded-lg px-3 py-2 text-sm" placeholder="장소명 검색..." value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} />
            <button onClick={doSearch} disabled={searching} className="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold disabled:opacity-50">{searching?'...':'검색'}</button>
          </div>
          {results.length>0 && (
            <div className="bg-black/40 rounded-lg border border-white/10 max-h-32 overflow-y-auto">
              {results.map((r,i)=><button key={i} onClick={()=>pickResult(r)} className="w-full text-left px-3 py-2 text-xs hover:bg-white/10 border-b border-white/5 last:border-0">{r.display_name}</button>)}
            </div>
          )}
          <p className="text-xs text-gray-400">지도를 클릭하거나 마커를 드래그하세요</p>
        </div>
        <div className="flex-1 relative"><div ref={mapRef} className="map-container" /></div>
        <div className="p-3 flex items-center justify-between border-t border-white/10">
          <span className="text-xs text-gray-400">{pos?`${pos[0].toFixed(5)}, ${pos[1].toFixed(5)}`:'위치를 선택하세요'}</span>
          <div className="flex gap-2">
            <button onClick={onClose} className="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">취소</button>
            <button onClick={()=>pos&&onConfirm(pos)} disabled={!pos} className="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold disabled:opacity-50">선택 완료</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TravelMap ── */
function TravelMap({ show, tripData, visibleDays }) {
  const mapRef=useRef(null); const mapInst=useRef(null);
  const layersRef=useRef([]); const tdRef=useRef(tripData);
  const vdRef=useRef(visibleDays); const pending=useRef(false);
  const inited=useRef(false);

  useEffect(()=>{tdRef.current=tripData;},[tripData]);
  useEffect(()=>{vdRef.current=visibleDays;},[visibleDays]);

  const applyLayers=useCallback((map)=>{
    layersRef.current.forEach(l=>map.removeLayer(l)); layersRef.current=[];
    const td=tdRef.current; const vd=vdRef.current;
    if(!td?.days) return;
    let all=[];
    td.days.forEach((day,di)=>{
      if(!vd[di]) return;
      const pts=day.places.filter(p=>p.pos);
      if(!pts.length) return;
      const col=DAY_COLORS[di%DAY_COLORS.length];
      if(pts.length>1){ const ln=L.polyline(pts.map(p=>p.pos),{color:col,weight:3,opacity:0.7,dashArray:'6 4'}); ln.addTo(map); layersRef.current.push(ln); }
      pts.forEach((p,pi)=>{
        const icon=L.divIcon({className:'',html:`<div style="background:${col};color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${pi+1}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
        const mk=L.marker(p.pos,{icon}); mk.bindPopup(`<b>${p.name}</b><br><span style="color:#aaa;font-size:12px">Day ${di+1} · ${p.time}</span>`); mk.addTo(map); layersRef.current.push(mk); all.push(p.pos);
      });
    });
    if(all.length>0) try{map.fitBounds(all,{padding:[30,30]});}catch{}
  },[]);

  useEffect(()=>{
    if(!show) return;
    if(!inited.current){
      setTimeout(()=>{
        if(!mapRef.current) return;
        const td=tdRef.current; const center=td?.hotel?.pos||[20,0]; const zoom=td?.hotel?.pos?12:2;
        const map=L.map(mapRef.current).setView(center,zoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
        mapInst.current=map; inited.current=true; applyLayers(map);
        setTimeout(()=>map.invalidateSize(),50); setTimeout(()=>map.invalidateSize(),300);
      },80); return;
    }
    if(mapInst.current){ applyLayers(mapInst.current); setTimeout(()=>mapInst.current?.invalidateSize(),50); setTimeout(()=>mapInst.current?.invalidateSize(),300); pending.current=false; }
  },[show,tripData,visibleDays]);

  useEffect(()=>{ if(!show&&mapInst.current) pending.current=true; },[tripData,visibleDays]);
  useEffect(()=>{ if(show&&pending.current&&mapInst.current){ applyLayers(mapInst.current); setTimeout(()=>mapInst.current?.invalidateSize(),50); setTimeout(()=>mapInst.current?.invalidateSize(),300); pending.current=false; } },[show]);

  return <div ref={mapRef} className="map-container" style={{display:show?'block':'none'}} />;
}

/* ── HomeView ── */

  const allOn=vis.every(Boolean);
  if(!tripData) return null;
  return (
    <div style={{display:show?'flex':'none'}} className="flex-col h-full">
      <div className="flex flex-wrap gap-2 p-3 border-b border-white/10">
        <button onClick={()=>setVis(v=>v.map(()=>!allOn))} className={`px-3 py-1 rounded-full text-xs font-semibold border transition-all ${allOn?'bg-white/15 border-white/30 text-white':'border-white/15 text-gray-400'}`}>{allOn?'전체 해제':'전체 선택'}</button>
        {(tripData.days||[]).map((_,i)=>(
          <button key={i} onClick={()=>setVis(v=>v.map((x,j)=>j===i?!x:x))}
            style={{borderColor:vis[i]?DAY_COLORS[i%DAY_COLORS.length]:'rgba(255,255,255,0.1)',backgroundColor:vis[i]?DAY_COLORS[i%DAY_COLORS.length]+'33':'transparent',color:vis[i]?DAY_COLORS[i%DAY_COLORS.length]:'#6b7280'}}
            className="px-3 py-1 rounded-full text-xs font-semibold border transition-all">Day {i+1}</button>
        ))}

        <h2 className="text-lg font-bold gradient-text">{tripData.name}</h2>

  return (
    <div style={{display:show?'block':'none'}} className="h-full overflow-y-auto">
      <div className="flex gap-1 p-3 overflow-x-auto border-b border-white/10 sticky top-0 bg-[#0f0f1a]/95 z-10">
        {tripData.days.map((_,i)=>(
          <button key={i} onClick={()=>setSel(i)}
            className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition-all ${sel===i?'text-white border-transparent':'border-white/15 text-gray-400'}`}
            style={sel===i?{background:DAY_COLORS[i%DAY_COLORS.length]}:{}}>Day {i+1}</button>
        ))}
      </div>
      {day&&<div className="p-4">
        <h3 className="text-sm font-bold text-gray-300 mb-3">Day {sel+1} · {formatDate(tripData.startDate?(()=>{const d=new Date(tripData.startDate+'T00:00:00');d.setDate(d.getDate()+sel);return d.toISOString().split('T')[0];})():'')}</h3>
        <div className="space-y-2">
          {day.places.length===0&&<p className="text-gray-500 text-sm py-8 text-center">일정이 없습니다</p>}
          {[...day.places].sort((a,b)=>a.time.localeCompare(b.time)).map(p=>(
            <div key={p.id} className="place-row flex gap-3 p-3 rounded-xl border border-white/8">
              <div className="text-center pt-0.5"><div className="text-xs font-mono text-gray-400 w-12">{p.time}</div><div className="w-2 h-2 rounded-full mx-auto mt-1.5" style={{background:CAT_COLORS[p.cat]||'#6b7280'}} /></div>
              <div className="flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold text-sm">{p.name}</span>
                  <span className="day-badge text-white" style={{background:CAT_COLORS[p.cat]||'#6b7280'}}>{p.cat}</span>
                  {p.pos&&<span className="text-xs text-green-400">📍</span>}
                </div>
                {p.detail&&<p className="text-xs text-gray-400 mt-0.5">{p.detail}</p>}
              </div>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

/* ── EditView ── */
function EditView({ tripData, onSave, onDelete, onAdd, show }) {

  function handleSave(form,di){
    const moveTo=form._moveTo??di; const f={...form}; delete f._moveTo;
    modal.mode==='edit'?onSave(modal.place.id,di,f,moveTo):onAdd(di,f);
    setModal(null);
  }
  return (
    <div style={{display:show?'block':'none'}} className="h-full overflow-y-auto">
      <div className="flex gap-1 p-3 overflow-x-auto border-b border-white/10 sticky top-0 bg-[#0f0f1a]/95 z-10">

        </div>
        <div className="space-y-2">
          {(tripData.days[sel]?.places||[]).length===0&&<p className="text-gray-500 text-sm py-8 text-center">장소를 추가해보세요</p>}
          {[...(tripData.days[sel]?.places||[])].sort((a,b)=>a.time.localeCompare(b.time)).map(p=>(
            <div key={p.id} className="place-row flex gap-3 p-3 rounded-xl border border-white/8 cursor-pointer" onClick={()=>setModal({mode:'edit',place:p})}>
              <div className="text-center pt-0.5"><div className="text-xs font-mono text-gray-400 w-12">{p.time}</div><div className="w-2 h-2 rounded-full mx-auto mt-1.5" style={{background:CAT_COLORS[p.cat]||'#6b7280'}} /></div>
              <div className="flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold text-sm">{p.name}</span>
                  <span className="day-badge text-white" style={{background:CAT_COLORS[p.cat]||'#6b7280'}}>{p.cat}</span>
                  {p.pos&&<span className="text-xs text-green-400">📍</span>}
                </div>
                {p.detail&&<p className="text-xs text-gray-400 mt-0.5">{p.detail}</p>}
              </div>
              <span className="text-gray-500 text-lg self-center">›</span>
            </div>
          ))}
        </div>
      </div>
      {modal&&<PlaceModal place={modal.mode==='edit'?modal.place:null} dayIndex={sel} numDays={tripData.days.length} onSave={handleSave} onDelete={id=>{onDelete(id,sel);setModal(null);}} onClose={()=>setModal(null)} />}
    </div>
  );
}

/* ── ChecklistView ── */
function ChecklistView({ tripId, show }) {
  const [clData,setClData]=useState([]);
  const [members,setMembers]=useState([]);
  const [ck,setCk]=useState({});
  const [editMode,setEditMode]=useState(false);
  const [loading,setLoading]=useState(true);
  const [addCatName,setAddCatName]=useState('');
  const [addItemMap,setAddItemMap]=useState({});
  const [editCatMap,setEditCatMap]=useState({});

  useEffect(()=>{ if(tripId) loadData(); },[tripId]);

  async function loadData(){
    setLoading(true);
    const [{data:cats},{data:mems},{data:checks}]=await Promise.all([
      sb.from('checklist_cats').select('*,checklist_items(*)').eq('trip_id',tripId).order('sort_order'),
      sb.from('trip_members').select('*').eq('trip_id',tripId).order('sort_order'),
      sb.from('checklist_checks').select('*').eq('trip_id',tripId),
    ]);
    const clArr=(cats||[]).map(c=>({id:c.id,cat:c.cat_name,items:(c.checklist_items||[]).sort((a,b)=>a.sort_order-b.sort_order).map(i=>({id:i.id,name:i.item_name}))}));
    setClData(clArr);
    setMembers(mems||[]);
    const ckMap={};
    (checks||[]).forEach(c=>{ if(!ckMap[c.person_key]) ckMap[c.person_key]={}; ckMap[c.person_key][c.item_id]=c.checked; });
    setCk(ckMap);
    setLoading(false);
  }

  async function toggleCk(personKey,itemId,cur){
    setCk(prev=>({...prev,[personKey]:{...prev[personKey],[itemId]:!cur}}));
    await sb.from('checklist_checks').upsert({trip_id:tripId,person_key:personKey,item_id:itemId,checked:!cur},{onConflict:'trip_id,person_key,item_id'});
  }

  async function addCat(){
    if(!addCatName.trim()) return;
    const emoji=autoEmoji(addCatName);
    const catName=`${emoji} ${addCatName}`;
    const {data}=await sb.from('checklist_cats').insert({trip_id:tripId,cat_name:catName,sort_order:clData.length}).select().single();
    if(data){ setClData(d=>[...d,{id:data.id,cat:catName,items:[]}]); setAddCatName(''); }
  }

  async function delCat(catId){
    await sb.from('checklist_cats').delete().eq('id',catId);
    setClData(d=>d.filter(c=>c.id!==catId));
  }

  async function updateCatName(catId, newName){
    const emoji=autoEmoji(newName); const full=newName.includes(' ')?newName:`${emoji} ${newName}`;
    await sb.from('checklist_cats').update({cat_name:full}).eq('id',catId);
    setClData(d=>d.map(c=>c.id===catId?{...c,cat:full}:c));
    setEditCatMap(m=>{const n={...m};delete n[catId];return n;});
  }

  async function addItem(catId){
    const val=(addItemMap[catId]||'').trim(); if(!val) return;
    const cat=clData.find(c=>c.id===catId);
    const {data}=await sb.from('checklist_items').insert({cat_id:catId,item_name:val,sort_order:cat?.items.length||0}).select().single();
    if(data){ setClData(d=>d.map(c=>c.id===catId?{...c,items:[...c.items,{id:data.id,name:val}]}:c)); setAddItemMap(m=>({...m,[catId]:''})); }
  }

  async function delItem(catId,itemId){
    await sb.from('checklist_items').delete().eq('id',itemId);
    setClData(d=>d.map(c=>c.id===catId?{...c,items:c.items.filter(i=>i.id!==itemId)}:c));
  }

  async function addMember(){
    const idx=members.length%GRAD_POOL.length;
    const newM={trip_id:tripId,person_key:`동행${members.length+1}`,emoji:EMOJI_POOL[members.length%EMOJI_POOL.length],color_hex:GRAD_POOL[idx].hex,grad_index:idx,sort_order:members.length};
    const {data}=await sb.from('trip_members').insert(newM).select().single();
    if(data) setMembers(m=>[...m,data]);
  }

  async function renameMember(id,val){
    await sb.from('trip_members').update({person_key:val}).eq('id',id);
    setMembers(m=>m.map(p=>p.id===id?{...p,person_key:val}:p));
  }

  async function delMember(id){
    await sb.from('trip_members').delete().eq('id',id);
    setMembers(m=>m.filter(p=>p.id!==id));
  }

  if(!show) return null;
  const gridCls=members.length<=1?'grid-cols-1':members.length===2?'grid-cols-2':'grid-cols-3';

  return (
    <div className="h-full overflow-y-auto p-3">
      <div className="flex items-center justify-between mb-3">
        <h2 className="font-bold text-base gradient-text">🧳 준비물 체크리스트</h2>
        <button onClick={()=>setEditMode(e=>!e)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${editMode?'bg-orange-500/30 text-orange-300 border border-orange-500/50':'bg-white/10 hover:bg-white/20 text-gray-300'}`}>{editMode?'✓ 완료':'✏️ 편집'}</button>
      </div>
      {loading?<div className="flex justify-center py-12"><Spinner /></div>:(
        <>
          {editMode&&(
            <div className="glass rounded-xl p-3 mb-4 border border-white/10">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-gray-300">👥 여행 멤버</span>
                <button onClick={addMember} className="px-2 py-1 rounded-lg bg-indigo-600/50 hover:bg-indigo-600 text-xs">+ 추가</button>
              </div>
              <div className="flex flex-wrap gap-2">
                {members.map(p=>(
                  <div key={p.id} className="flex items-center gap-1.5 glass px-2 py-1 rounded-lg border border-white/10">
                    <span>{p.emoji}</span>
                    <input value={p.person_key} onChange={e=>renameMember(p.id,e.target.value)} className="w-20 bg-transparent border-none text-xs font-semibold text-white p-0 outline-none" />
                    {members.length>1&&<button onClick={()=>delMember(p.id)} className="text-red-400 text-xs ml-1">✕</button>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {clData.map(cat=>(
            <div key={cat.id} className="glass rounded-xl mb-3 border border-white/8 overflow-hidden">
              <div className="flex items-center justify-between px-3 py-2 border-b border-white/8 bg-white/3">
                {editMode&&editCatMap[cat.id]!==undefined
                  ?<div className="flex gap-1 flex-1"><input value={editCatMap[cat.id]} onChange={e=>setEditCatMap(m=>({...m,[cat.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&updateCatName(cat.id,editCatMap[cat.id])} className="flex-1 rounded px-2 py-0.5 text-xs" /><button onClick={()=>updateCatName(cat.id,editCatMap[cat.id])} className="px-2 py-0.5 rounded bg-indigo-600 text-xs">✓</button></div>
                  :<span className="font-bold text-sm cursor-pointer" onClick={()=>editMode&&setEditCatMap(m=>({...m,[cat.id]:cat.cat}))}>{cat.cat}</span>
                }
                {editMode&&<button onClick={()=>delCat(cat.id)} className="text-red-400 hover:text-red-300 text-xs ml-2">🗑️</button>}
              </div>
              <div className="p-2">
                {cat.items.map(item=>(
                  <div key={item.id} className="flex items-center gap-2 py-1">
                    {editMode&&<button onClick={()=>delItem(cat.id,item.id)} className="text-red-400 text-xs w-4 flex-shrink-0">✕</button>}
                    <div className={`flex-1 grid gap-2 ${gridCls}`}>
                      {members.map(p=>{
                        const checked=ck[p.person_key]?.[item.id]||false;
                        const g=GRAD_POOL[p.grad_index%GRAD_POOL.length];
                        return (
                          <label key={p.id} className="flex items-center gap-1.5 cursor-pointer">
                            <div onClick={()=>toggleCk(p.person_key,item.id,checked)}
                              className={`w-4 h-4 rounded border-2 flex-shrink-0 flex items-center justify-center transition-all`}
                              style={checked?{background:g.hex,borderColor:g.hex}:{borderColor:'rgba(255,255,255,0.2)'}}>
                              {checked&&<span className="text-white text-xs leading-none">✓</span>}
                            </div>
                            <span className={`text-xs leading-tight ${checked?'checked-item':'text-gray-300'}`}>
                              {members.length>1&&<span style={{color:g.hex}} className="mr-1">{p.emoji}</span>}
                              {item.name}
                            </span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                ))}
                {editMode&&(
                  <div className="flex gap-1 mt-2">
                    <input value={addItemMap[cat.id]||''} onChange={e=>setAddItemMap(m=>({...m,[cat.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addItem(cat.id)} className="flex-1 rounded px-2 py-1 text-xs" placeholder="항목 추가..." />
                    <button onClick={()=>addItem(cat.id)} className="px-2 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-xs">+</button>
                  </div>
                )}
              </div>
            </div>
          ))}
          {editMode&&(
            <div className="flex gap-2 mt-3">
              <input value={addCatName} onChange={e=>setAddCatName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()} className="flex-1 rounded-lg px-3 py-2 text-sm" placeholder="새 카테고리..." />
              <button onClick={addCat} className="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">+ 카테고리</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

                <span>📍</span><span className="flex-1 text-left text-gray-300">{form.hotelPos?`${form.hotelPos[0].toFixed(4)}, ${form.hotelPos[1].toFixed(4)}`:'숙소 위치 선택'}</span>
                {form.hotelPos&&<span className="text-green-400 text-xs">✓</span>}
              </button>

          <div className="flex justify-end gap-2 p-4 border-t border-white/10">
            <button onClick={onClose} className="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm">취소</button>
            <button onClick={save} className="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">저장</button>

    </>
  );
}

/* ── CreateTripModal ── */
function CreateTripModal({ userId, onCreated, onClose }) {
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:'',destination:'',startDate:'',endDate:'',hotelName:'',hotelPos:null});
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);
  const [showMap,setShowMap]=useState(false);
  function set(k,v){setForm(f=>({...f,[k]:v}));setErrors(e=>({...e,[k]:''}));}
  function validate(){
    const e={};
    if(step===0){if(!form.name.trim())e.name='필수';if(!form.destination.trim())e.destination='필수';}
    if(step===1){if(!form.startDate)e.startDate='필수';if(!form.endDate)e.endDate='필수';if(form.startDate&&form.endDate&&new Date(form.endDate)<new Date(form.startDate))e.endDate='출발일 이후여야 합니다';}
    setErrors(e); return Object.keys(e).length===0;
  }
  function next(){if(validate())setStep(s=>s+1);}

  async function create(){
    setLoading(true);
    const {data:trip,error}=await sb.from('trips').insert({
      user_id:userId,name:form.name,destination:form.destination,
      start_date:form.startDate,end_date:form.endDate,
      hotel_name:form.hotelName||null,hotel_lat:form.hotelPos?form.hotelPos[0]:null,hotel_lng:form.hotelPos?form.hotelPos[1]:null
    }).select().single();
    if(error||!trip){setLoading(false);return;}

    // 기본 체크리스트 생성
    for(let i=0;i<CL_DEFAULT.length;i++){
      const {data:cat}=await sb.from('checklist_cats').insert({trip_id:trip.id,cat_name:CL_DEFAULT[i].cat,sort_order:i}).select().single();
      if(cat) for(let j=0;j<CL_DEFAULT[i].items.length;j++) await sb.from('checklist_items').insert({cat_id:cat.id,item_name:CL_DEFAULT[i].items[j],sort_order:j});
    }
    // 기본 멤버 2명
    await sb.from('trip_members').insert([
      {trip_id:trip.id,person_key:'나',emoji:'🧡',color_hex:'#8B5CF6',grad_index:0,sort_order:0},
      {trip_id:trip.id,person_key:'동행',emoji:'💚',color_hex:'#EC4899',grad_index:1,sort_order:1},
    ]);
    setLoading(false);
    onCreated(trip);
  }

  const steps=['기본 정보','여행 날짜','숙소 설정'];
  return (
    <>
      <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/70 p-4">
        <div className="glass rounded-2xl w-full max-w-md fade-in">
          <div className="flex items-center justify-between p-4 border-b border-white/10">
            <div>
              <h3 className="font-bold text-lg gradient-text">✈️ 새 여행 만들기</h3>
              <p className="text-xs text-gray-400 mt-0.5">{step+1}/{steps.length} · {steps[step]}</p>
            </div>
            <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">×</button>
          </div>
          <div className="p-5 space-y-3">
            {step===0&&<>
              <div><label className="text-xs text-gray-400 mb-1 block">여행 이름 *</label><input className="w-full rounded-xl px-4 py-3 text-sm" placeholder="예: 도쿄 봄 여행 🌸" value={form.name} onChange={e=>set('name',e.target.value)} onKeyDown={e=>e.key==='Enter'&&next()} />{errors.name&&<p className="text-red-400 text-xs mt-1">{errors.name}</p>}</div>
              <div><label className="text-xs text-gray-400 mb-1 block">여행지 *</label><input className="w-full rounded-xl px-4 py-3 text-sm" placeholder="예: 일본 도쿄" value={form.destination} onChange={e=>set('destination',e.target.value)} onKeyDown={e=>e.key==='Enter'&&next()} />{errors.destination&&<p className="text-red-400 text-xs mt-1">{errors.destination}</p>}</div>
            </>}
            {step===1&&<>
              <div><label className="text-xs text-gray-400 mb-1 block">출발일 *</label><input type="date" className="w-full rounded-xl px-4 py-3 text-sm" value={form.startDate} onChange={e=>set('startDate',e.target.value)} />{errors.startDate&&<p className="text-red-400 text-xs mt-1">{errors.startDate}</p>}</div>
              <div><label className="text-xs text-gray-400 mb-1 block">귀국일 *</label><input type="date" className="w-full rounded-xl px-4 py-3 text-sm" value={form.endDate} onChange={e=>set('endDate',e.target.value)} />{errors.endDate&&<p className="text-red-400 text-xs mt-1">{errors.endDate}</p>}</div>
              {form.startDate&&form.endDate&&!errors.endDate&&<div className="bg-indigo-500/15 border border-indigo-500/30 rounded-xl p-3 text-sm text-indigo-300">🗓️ 총 <strong>{dateRange(form.startDate,form.endDate).length}일</strong></div>}
            </>}
            {step===2&&<>
              <div><label className="text-xs text-gray-400 mb-1 block">숙소명</label><input className="w-full rounded-xl px-4 py-3 text-sm" placeholder="예: 신주쿠 그랜드 호텔" value={form.hotelName} onChange={e=>set('hotelName',e.target.value)} /></div>
              <div><label className="text-xs text-gray-400 mb-1 block">숙소 위치</label>
                <button onClick={()=>setShowMap(true)} className="w-full rounded-xl px-4 py-3 text-sm border border-white/15 hover:border-indigo-400 flex items-center gap-2">
                  <span>📍</span><span className="flex-1 text-left text-gray-400">{form.hotelPos?`${form.hotelPos[0].toFixed(4)}, ${form.hotelPos[1].toFixed(4)}`:'지도에서 선택'}</span>
                  {form.hotelPos&&<span className="text-green-400 text-xs">✓</span>}
                </button>
              </div>
              <p className="text-xs text-gray-500">숙소는 나중에 설정에서 수정 가능합니다</p>
            </>}
          </div>
          <div className="flex justify-between p-4 border-t border-white/10">
            <button onClick={()=>setStep(s=>s-1)} disabled={step===0} className="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-sm disabled:opacity-30">← 이전</button>
            {step<steps.length-1
              ?<button onClick={next} className="px-6 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">다음 →</button>
              :<button onClick={create} disabled={loading} className="px-6 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-sm font-semibold disabled:opacity-50 flex items-center gap-2">
                {loading?<><Spinner size="4" /> 생성 중...</>:'여행 시작! 🚀'}
              </button>
            }
          </div>
        </div>
      </div>
      {showMap&&<MapPickerModal initialPos={form.hotelPos} initialName={form.hotelName} onConfirm={p=>{set('hotelPos',p);setShowMap(false);}} onClose={()=>setShowMap(false)} />}
    </>
  );
}

/* ── DashboardView ── */
function DashboardView({ user, onOpenTrip, onSignOut }) {
  const [trips,setTrips]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCreate,setShowCreate]=useState(false);

  useEffect(()=>{ loadTrips(); },[]);

  async function loadTrips(){
    setLoading(true);
    const {data}=await sb.from('trips').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
    setTrips(data||[]);
    setLoading(false);
  }

  async function deleteTrip(id,e){
    e.stopPropagation();
    if(!confirm('이 여행을 삭제하시겠습니까? 모든 데이터가 삭제됩니다.')) return;
    await sb.from('trips').delete().eq('id',id);
    setTrips(t=>t.filter(x=>x.id!==id));
  }

  function onCreated(trip){ setShowCreate(false); loadTrips(); }

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-[#0f0f1a] to-purple-950">
      {/* header */}
      <div className="flex items-center justify-between px-4 py-4 border-b border-white/10 glass sticky top-0 z-10">
        <div className="flex items-center gap-2">
          <span className="text-2xl">✈️</span>
          <h1 className="text-lg font-black gradient-text">Travel Planner</h1>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-400">{user.email}</span>
          <button onClick={onSignOut} className="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-xs">로그아웃</button>
        </div>
      </div>

      <div className="max-w-2xl mx-auto p-4">
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-xl font-bold">내 여행 목록</h2>
          <button onClick={()=>setShowCreate(true)} className="px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-sm font-semibold">+ 새 여행</button>
        </div>

        {loading?<div className="flex justify-center py-16"><Spinner size="8" /></div>:
          trips.length===0
            ?<div className="text-center py-16">
              <div className="text-5xl mb-4">🌍</div>
              <p className="text-gray-400 mb-2">아직 여행이 없어요</p>
              <p className="text-gray-500 text-sm mb-6">첫 여행을 계획해보세요!</p>
              <button onClick={()=>setShowCreate(true)} className="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold">여행 만들기</button>
            </div>
            :<div className="space-y-3">
              {trips.map(t=>{
                const days=dateRange(t.start_date,t.end_date).length;
                return (
                  <div key={t.id} onClick={()=>onOpenTrip(t)} className="glass rounded-2xl p-4 cursor-pointer hover:border-indigo-500/50 border border-white/10 transition-all hover:bg-white/5 fade-in">
                    <div className="flex items-start justify-between">
                      <div className="flex-1">
                        <h3 className="font-bold text-base">{t.name}</h3>
                        <p className="text-sm text-gray-400 mt-0.5">{t.destination}</p>
                        <div className="flex items-center gap-3 mt-2">
                          <span className="text-xs text-gray-400">📅 {t.start_date} ~ {t.end_date}</span>
                          <span className="text-xs text-indigo-400 font-semibold">총 {days}일</span>
                          {t.hotel_name&&<span className="text-xs text-gray-500">🏨 {t.hotel_name}</span>}
                        </div>
                      </div>
                      <button onClick={e=>deleteTrip(t.id,e)} className="ml-3 w-8 h-8 rounded-lg bg-red-500/15 hover:bg-red-500/40 flex items-center justify-center text-red-400 text-sm flex-shrink-0">🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
        }
      </div>
      {showCreate&&<CreateTripModal userId={user.id} onCreated={onCreated} onClose={()=>setShowCreate(false)} />}
    </div>
  );
}

/* ── TripView ── */
function TripView({ tripMeta, user, onBack }) {
  const [tripData,setTripData]=useState(null);
  const [tab,setTab]=useState('home');
  const [showSettings,setShowSettings]=useState(false);
  const [loading,setLoading]=useState(true);
  const { toast, Toast } = useToast();

  useEffect(()=>{ loadTrip(); },[tripMeta.id]);

  async function loadTrip(){
    setLoading(true);
    const [{data:trip},{data:places}]=await Promise.all([
      sb.from('trips').select('*').eq('id',tripMeta.id).single(),
      sb.from('places').select('*').eq('trip_id',tripMeta.id).order('day_index').order('time'),
    ]);
    if(!trip){setLoading(false);return;}
    const numDays=dateRange(trip.start_date,trip.end_date).length;
    const days=Array.from({length:numDays},(_,i)=>({
      dayIndex:i,
      places:(places||[]).filter(p=>p.day_index===i).map(p=>({id:p.id,time:p.time,name:p.name,detail:p.detail||'',cat:p.cat,pos:p.pos_lat&&p.pos_lng?[p.pos_lat,p.pos_lng]:null}))
    }));
    setTripData({id:trip.id,name:trip.name,destination:trip.destination,startDate:trip.start_date,endDate:trip.end_date,hotel:{name:trip.hotel_name,pos:trip.hotel_lat&&trip.hotel_lng?[trip.hotel_lat,trip.hotel_lng]:null},days});
    setLoading(false);
  }

  async function handleAdd(dayIdx,form){
    const {data}=await sb.from('places').insert({trip_id:tripData.id,day_index:dayIdx,time:form.time,name:form.name,detail:form.detail||'',cat:form.cat,pos_lat:form.pos?form.pos[0]:null,pos_lng:form.pos?form.pos[1]:null}).select().single();
    if(data){
      const p={id:data.id,time:form.time,name:form.name,detail:form.detail||'',cat:form.cat,pos:form.pos||null};
      setTripData(td=>({...td,days:td.days.map((d,i)=>i===dayIdx?{...d,places:[...d.places,p]}:d)}));
      toast('장소가 추가되었습니다');
    }
  }

  async function handleSave(id,fromDay,form,toDay){
    await sb.from('places').update({day_index:toDay,time:form.time,name:form.name,detail:form.detail||'',cat:form.cat,pos_lat:form.pos?form.pos[0]:null,pos_lng:form.pos?form.pos[1]:null}).eq('id',id);
    const p={id,time:form.time,name:form.name,detail:form.detail||'',cat:form.cat,pos:form.pos||null};
    setTripData(td=>({...td,days:td.days.map((d,i)=>{
      if(i===fromDay&&fromDay!==toDay) return {...d,places:d.places.filter(x=>x.id!==id)};
      if(i===toDay&&fromDay!==toDay) return {...d,places:[...d.places,p]};
      if(i===fromDay) return {...d,places:d.places.map(x=>x.id===id?p:x)};
      return d;
    })}));
    toast('저장되었습니다');
  }

  async function handleDelete(id,dayIdx){
    await sb.from('places').delete().eq('id',id);
    setTripData(td=>({...td,days:td.days.map((d,i)=>i===dayIdx?{...d,places:d.places.filter(x=>x.id!==id)}:d)}));
    toast('삭제되었습니다');
  }

  async function handleSettingsSave(form){
    await sb.from('trips').update({name:form.name,destination:form.destination,start_date:form.startDate,end_date:form.endDate,hotel_name:form.hotelName||null,hotel_lat:form.hotelPos?form.hotelPos[0]:null,hotel_lng:form.hotelPos?form.hotelPos[1]:null}).eq('id',tripData.id);
    const newNumDays=dateRange(form.startDate,form.endDate).length;
    const oldNumDays=tripData.days.length;
    let newDays=[...tripData.days];
    if(newNumDays>oldNumDays) for(let i=oldNumDays;i<newNumDays;i++) newDays.push({dayIndex:i,places:[]});
    else newDays=newDays.slice(0,newNumDays);
    setTripData(td=>({...td,name:form.name,destination:form.destination,startDate:form.startDate,endDate:form.endDate,hotel:{name:form.hotelName,pos:form.hotelPos},days:newDays}));
    setShowSettings(false);
    toast('설정이 저장되었습니다');
  }

  const tabs=[{id:'home',label:'🗺️ 지도'},{id:'day',label:'📋 일정'},{id:'edit',label:'✏️ 편집'},{id:'cl',label:'🧳 준비물'}];

  if(loading) return <div className="flex-1 flex items-center justify-center"><Spinner size="10" /></div>;

  return (
    <div className="flex flex-col h-screen">
      <div className="flex items-center gap-3 px-3 py-2.5 border-b border-white/10 bg-[#0f0f1a]/95 sticky top-0 z-20">
        <button onClick={onBack} className="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center text-sm">←</button>
        <div className="flex-1 min-w-0">
          <h1 className="font-black text-sm gradient-text truncate">{tripData?.name}</h1>
          <p className="text-xs text-gray-500 truncate">{tripData?.destination} · {tripData?.startDate} ~ {tripData?.endDate}</p>
        </div>
        <button onClick={()=>setShowSettings(true)} className="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center text-sm">⚙️</button>
      </div>
      <div className="flex gap-1 px-3 py-2 border-b border-white/10 bg-[#0f0f1a]/90">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${tab===t.id?'bg-gradient-to-r from-indigo-600 to-purple-600 text-white':'text-gray-400 hover:bg-white/10'}`}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="flex-1 overflow-hidden relative">
        {tripData&&<HomeView tripData={tripData} show={tab==='home'} />}
        {tripData&&<DayView tripData={tripData} show={tab==='day'} />}
        {tripData&&<EditView tripData={tripData} onSave={handleSave} onDelete={handleDelete} onAdd={handleAdd} show={tab==='edit'} />}
        <div style={{display:tab==='cl'?'block':'none'}} className="h-full overflow-hidden">
          <ChecklistView tripId={tripData?.id} show={tab==='cl'} />
        </div>
      </div>
      {showSettings&&tripData&&<TripSettingsModal tripData={tripData} onSave={handleSettingsSave} onClose={()=>setShowSettings(false)} />}
      {Toast}
    </div>
  );
}

/* ── AuthView ── */
function AuthView({ onAuth }) {
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [done,setDone]=useState(false);

  async function submit(){
    if(!email.trim()||!pw.trim()) return;
    setLoading(true); setError('');
    if(mode==='login'){
      const {data,error:e}=await sb.auth.signInWithPassword({email,password:pw});
      if(e) setError(e.message==='Invalid login credentials'?'이메일 또는 비밀번호가 틀립니다':e.message);
      else onAuth(data.user);
    } else {
      const {error:e}=await sb.auth.signUp({email,password:pw});
      if(e) setError(e.message);
      else setDone(true);
    }
    setLoading(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-950 via-[#0f0f1a] to-purple-950">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">✈️</div>
          <h1 className="text-3xl font-black gradient-text">Travel Planner</h1>
          <p className="text-gray-400 text-sm mt-1">나만의 여행 계획을 만들어보세요</p>
        </div>
        {done?<div className="glass rounded-2xl p-8 text-center">
          <div className="text-4xl mb-3">📧</div>
          <h2 className="font-bold text-lg mb-2">이메일을 확인해주세요</h2>
          <p className="text-gray-400 text-sm">가입 확인 이메일이 발송되었습니다.<br/>확인 후 로그인하세요.</p>
          <button onClick={()=>{setDone(false);setMode('login');}} className="mt-4 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm">로그인하기</button>
        </div>:(
          <div className="glass rounded-2xl p-6 fade-in">
            <div className="flex gap-1 mb-5 bg-white/5 rounded-xl p-1">
              <button onClick={()=>{setMode('login');setError('');}} className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${mode==='login'?'bg-indigo-600 text-white':'text-gray-400'}`}>로그인</button>
              <button onClick={()=>{setMode('signup');setError('');}} className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${mode==='signup'?'bg-indigo-600 text-white':'text-gray-400'}`}>회원가입</button>
            </div>
            <div className="space-y-3">
              <div><label className="text-xs text-gray-400 mb-1 block">이메일</label><input type="email" className="w-full rounded-xl px-4 py-3 text-sm" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></div>
              <div><label className="text-xs text-gray-400 mb-1 block">비밀번호</label><input type="password" className="w-full rounded-xl px-4 py-3 text-sm" placeholder="6자 이상" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></div>
              {error&&<p className="text-red-400 text-xs bg-red-500/10 rounded-lg px-3 py-2">{error}</p>}
              <button onClick={submit} disabled={loading||!email.trim()||!pw.trim()} className="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 font-semibold text-sm disabled:opacity-50 flex items-center justify-center gap-2 mt-1">
                {loading?<><Spinner size="4" />{mode==='login'?'로그인 중...':'가입 중...'}</>:mode==='login'?'로그인':'회원가입'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [user,setUser]=useState(undefined);
  const [activeTrip,setActiveTrip]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return ()=>subscription.unsubscribe();
  },[]);

  async function signOut(){ await sb.auth.signOut(); setUser(null); setActiveTrip(null); }

  if(user===undefined) return <div className="min-h-screen flex items-center justify-center"><Spinner size="10" /></div>;
  if(!user) return <AuthView onAuth={setUser} />;
  if(activeTrip) return <TripView tripMeta={activeTrip} user={user} onBack={()=>setActiveTrip(null)} />;
  return <DashboardView user={user} onOpenTrip={setActiveTrip} onSignOut={signOut} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
